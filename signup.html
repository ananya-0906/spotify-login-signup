<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<main>
    <section class="signup-section">
        <div class="mobile-logo">
            <img src="spotify-mobile-logo.png" alt="Spotify Logo">
        </div>
        <div class="container">
            <div class="left-section">
                <div class="logo">
                    <img class="logo-img" src="spotify-logo.png" alt="logo">
                </div>
                <div class="content">
                    <h2 class="main">Your Music Journey <br> Starts Here</h2>
                    <p class="sub">Millions of songs. No credit card required.</p>
                </div>
            </div>
            <div class="right-section">
                <h1 class="signup">Sign Up</h1>
                <h6 class="subtitle">It's quick and easy.</h6>
                <form id="signupForm">
                    <div class="name-group"> <!--name-->
                        <div class="input-group">
                            <label for="firstname">First name</label>
                            <input type="text" id="firstname" name="firstname" placeholder="enter your first name">
                        </div>
                        <div class="input-group">
                            <label for="lastname">Last name</label>
                            <input type="text" id="lastname" name="lastname" placeholder="enter your last name">
                        </div>
                    </div>
                    <div class="input-group"> <!--email-->
                        <label for="email" >Email address</label>
                        <input type="email" id="email" name="email" placeholder="enter your email">
                    </div> 
                    <div id="email-error" class="error-message"></div>
                    <div class="input-group"> <!--password-->
                        <label for="pass">Password</label>
                        <input type="password" id="pass" name="pass" placeholder="Create a password">
                    </div>
                    <div id="pass-error" class="error-message"></div>
                    <div class="dob-group"> <!--DOB-->
                        <label>Date of Birth</label>
                        <input type="text" id="day" placeholder="DD" maxlength="2">
                        <select id="month">
                            <option value="">Month</option>
                        </select>
                        <input type="text" id="year" placeholder="YYYY" maxlength="4">
                    </div>
                    <div class="gender-option">
                        <input type="radio" id="female" name="gender">
                            <label for="female">Female</label>
                        <input type="radio" id="male" name="gender">
                            <label for="female">Male</label>
                        <input type="radio" id="non-binary" name="gender">
                            <label for="female">Non-binary</label>
                        <input type="radio" id="not-to-say" name="gender">
                            <label for="female">Prefer not to say</label>
                    </div>
                    <button type="submit" class="signup-btn">Sign up</button>
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <div class="social-signup">
                        <button type="button" class="social-btn">
                            <svg class="button-icon-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone-icon lucide-phone">
                                <path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/>
                            </svg>
                            <span>Continue with phone number</span>
                        </button>
                        <button type="button" class="social-btn">
                           <svg class="button-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
                                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
                                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 19 12 24 12c3.1 0 5.8 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/>
                                <path fill="#4CAF50" d="M24 44c5.1 0 9.8-1.9 13.4-5.1l-6.2-5.2C29.1 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9.6 39.5 16.3 44 24 44z"/>
                                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.1 7.1l6.2 5.2C39 37 44 31.1 44 24c0-1.3-.1-2.7-.4-3.9z"/>
                            </svg>
                            <span>Continue with Google</span>
                        </button>
                        <button type="button" class="social-btn">
                            <svg class="button-icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="#ffffff">
                                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.7-1.13 1.84-.99 2.94 1.07.08 2.16-.52 2.82-1.33z"/>
                            </svg>
                            <span>Continue with Apple</span>
                        </button>
                    </div>
                    <p class="login-text">
                        Already have an account?
                        <a href="login.html">Log in</a>
                    </p>
                    <small> This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.</small>
                </form>
            </div>
        </div>
    </section>
</main>
<script src="script.js"></script>
</body>
</html>
